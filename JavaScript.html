<script>
  // ฟังก์ชันส่วนกลางสำหรับจัดการเมื่อมีการกดปุ่ม "Submit" จากฟอร์มไหนก็ได้
  function handleFormSubmit(event, actionName, btnId) {
    event.preventDefault();

    const btn = document.getElementById(btnId);
    const originalText = btn.innerHTML;

    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> ประมวลผล...';
    btn.disabled = true;

    let payload = { action: actionName };

    if (actionName === 'จองรถ EV') {
      payload.name        = document.getElementById('bookName').value;
      payload.dept        = document.getElementById('bookDept').value;
      payload.carRegis    = document.getElementById('bookCar').value;
      payload.destination = document.getElementById('bookDestination').value;
      payload.startDate   = document.getElementById('startDate').value;
      payload.endDate     = document.getElementById('endDate').value;
    } else if (actionName === 'รายงานใช้รถ') {
      payload.name           = document.getElementById('repName').value;
      payload.chargeDate     = document.getElementById('SetDate').value;
      payload.dept           = document.getElementById('AgenName').value;
      payload.mileage        = document.getElementById('mileage').value;
      payload.battBefore     = document.getElementById('battBefore').value;
      payload.battAfter      = document.getElementById('battAfter').value;
      payload.stationNetwork = document.getElementById('primarySelect').value;
      payload.stationDetail  = document.getElementById('secondarySelect').value;
      payload.extraInfo      = document.getElementById('extraTextBox').value;
    }

    google.script.run
      .withSuccessHandler(function(response) {
        btn.innerHTML = originalText;
        btn.disabled = false;

        if(response.status === "success") {
          Swal.fire('สำเร็จ!', response.message, 'success');
          event.target.reset();
        } else {
          Swal.fire('เกิดข้อผิดพลาด!', response.message, 'error');
        }
      })
      .submitData(payload);
  }

  // --- 1. ฟังก์ชันตรวจสอบรหัสพนักงาน ---
  function verifyId() {
    const empId = document.getElementById('empId').value;
    if(empId.length !== 6) {
      Swal.fire('แจ้งเตือน', 'กรุณาระบุรหัสพนักงาน 6 หลักให้ครบถ้วน', 'warning');
      return;
    }

    const btn = document.getElementById('btnCheckId');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    btn.disabled = true;

    // ส่งรหัสไปเช็คหลังบ้าน
    google.script.run
      .withSuccessHandler(function(response) {
        btn.innerHTML = 'ตรวจสอบสิทธิ์';
        btn.disabled = false;

        if(response.status === 'success') {
          // ถ้ารหัสถูกต้อง: ใส่ชื่อ, ปลดล็อคฟอร์ม, ล็อคช่องรหัส
          document.getElementById('grabName').value = response.name;
          document.getElementById('grabDetails').disabled = false; 
          document.getElementById('empId').readOnly = true; 
          btn.style.display = 'none'; // ซ่อนปุ่มเช็คไปเลย
          
          Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ยืนยันตัวตนสำเร็จ', showConfirmButton: false, timer: 1500 });
        } else {
          // ถ้าไม่พบรหัส
          Swal.fire('ไม่อนุญาต', 'ไม่พบรหัสพนักงานนี้ในระบบ หรือท่านไม่มีสิทธิ์ใช้งาน', 'error');
          document.getElementById('grabName').value = '';
          document.getElementById('grabDetails').disabled = true;
        }
      })
      .checkEmployeeId(empId);
  }

  // --- 2. ฟังก์ชันกดขอโค้ด (เฉพาะของฟอร์ม Grab) ---
  function submitGrabForm(event) {
    event.preventDefault();
    const btn = document.getElementById('grabBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังประมวลผล...';
    btn.disabled = true;

    // รวบรวมข้อมูลทั้งหมดในฟอร์ม
    const payload = {
      empId: document.getElementById('empId').value,
      name: document.getElementById('grabName').value,
      tripType: document.getElementById('tripType').value, // จะได้ค่า "1" หรือ "2"
      location: document.getElementById('location').value
    };

    google.script.run
      .withSuccessHandler(function(response) {
        btn.innerHTML = '🎁 ยืนยันการเบิกโค้ด';
        btn.disabled = false;

        if(response.status === "success") {
           // โชว์โค้ดที่ได้ และรีเซ็ตฟอร์มกลับเป็นหน้าแรกเริ่ม
          Swal.fire('สำเร็จ!', response.message, 'success').then(() => {
             document.getElementById('grabForm').reset();
             document.getElementById('grabDetails').disabled = true; // ล็อคฟอร์มอีกครั้ง
             document.getElementById('empId').readOnly = false; // ปลดล็อคให้พิมพ์รหัสใหม่ได้
             document.getElementById('btnCheckId').style.display = 'block'; // โชว์ปุ่มเช็คอีกครั้ง
          });
        } else {
          Swal.fire('ข้อผิดพลาด!', response.message, 'error');
        }
      })
      .processGrabRequest(payload); // ส่งไปหลังบ้าน
  }
</script>
